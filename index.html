<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* 🔥 তোমার Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyCkrtNYqQl2CXtZEiANExp18nBElaea67k",
  authDomain: "zargon-tracker-20750.firebaseapp.com",
  projectId: "zargon-tracker-20750",
  storageBucket: "zargon-tracker-20750.firebasestorage.app",
  messagingSenderId: "1037133669383",
  appId: "1:1037133669383:web:ad2582e5d64d2e15f8f6a2",
  measurementId: "G-MKTKRWV4DB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

/* ================= LOGIN ================= */

window.onload = function(){
  if(localStorage.getItem("loggedIn")==="true"){
    showMain();
  }
}

function login(){
  if(user.value==="admin" && pass.value==="zargon123"){
    localStorage.setItem("loggedIn","true");
    showMain();
  }else{
    alert("Wrong Login Info");
  }
}

function logout(){
  localStorage.removeItem("loggedIn");
  main.style.display="none";
  loginPage.style.display="flex";
}

function showMain(){
  loginPage.style.display="none";
  main.style.display="block";
}

/* ================= REALTIME LOAD ================= */

const tbody = document.getElementById("tbody");

onSnapshot(collection(db,"zargonData"), (snapshot)=>{
  tbody.innerHTML="";
  let i=1;

  snapshot.forEach((docSnap)=>{
    let d = docSnap.data();

    tbody.innerHTML += `
    <tr>
      <td>${i++}</td>
      <td>${d.date}</td>
      <td>${d.cycle}</td>
      <td>${d.code}</td>
      <td>${d.raw}</td>
      <td>${d.edit}</td>
      <td><span class="${d.editStatus==='Done'?'done':'pending'}">${d.editStatus}</span></td>
      <td><span class="${d.adsStatus==='Done'?'done':'pending'}">${d.adsStatus}</span></td>
      <td>
        <button class="action-btn edit" onclick="editData('${docSnap.id}')">Edit</button>
        <button class="action-btn delete" onclick="deleteData('${docSnap.id}')">Delete</button>
      </td>
    </tr>
    `;
  });
});

/* ================= ADD / UPDATE ================= */

window.addData = async function(){

  if(!date.value || !cycle.value || !code.value){
    alert("Please fill required fields");
    return;
  }

  let item={
    date:date.value,
    cycle:cycle.value,
    code:code.value,
    raw:raw.value,
    edit:edit.value,
    editStatus:editStatus.value,
    adsStatus:adsStatus.value
  };

  if(editId){
    await updateDoc(doc(db,"zargonData",editId), item);
    editId=null;
    addBtn.innerText="Add";
  }else{
    await addDoc(collection(db,"zargonData"), item);
  }

  clearFields();
}

/* ================= EDIT ================= */

window.editData = function(id){
  editId=id;
  addBtn.innerText="Update";
}

/* ================= DELETE ================= */

window.deleteData = async function(id){
  if(confirm("Are you sure to delete?")){
    await deleteDoc(doc(db,"zargonData",id));
  }
}

/* ================= CLEAR ================= */

function clearFields(){
  date.value="";
  cycle.value="";
  code.value="";
  raw.value="";
  edit.value="";
  editStatus.value="Done";
  adsStatus.value="Done";
  addBtn.innerText="Add";
}

</script>
